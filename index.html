<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이화여자고등학교 안내 웹앱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #F1E0C5; /* 따뜻한 크림 */
            color: #342A21; /* 딥 브라운 */
        }

        /* [요청] 상단 바 70% 불투명도 및 로고 옆 검색창 배치 */
        .top-bar {
            position: fixed; 
            top: 0; left: 0; width: 100%;
            background-color: rgba(241, 224, 197, 0.7); /* 70% 불투명 크림 */
            z-index: 1000; 
            padding: 10px 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px rgba(52, 42, 33, 0.1);
            border-bottom: 1px solid rgba(201, 183, 156, 0.4);
            backdrop-filter: blur(5px);
        }

        .logo-link { display: flex; align-items: center; text-decoration: none; cursor: pointer; }
        .logo-img { height: 40px; width: auto; object-fit: contain; }

        .search-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .search-bar label { font-weight: bold; color: #00643C; font-size: 14px; }
        .search-bar select {
            padding: 8px 12px; font-size: 14px;
            border: 1px solid #C9B79C; border-radius: 6px;
            min-width: 140px; cursor: pointer; outline: none;
            color: #342A21; background-color: #ffffff;
        }
        .search-bar select:focus { border-color: #00643C; }

        .search-btn {
            background-color: #00643C; color: #F1E0C5; border: none;
            padding: 8px 18px; font-size: 14px; font-weight: bold;
            border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .search-btn:hover { background-color: #342A21; }

        /* [요청] 사진이 홈페이지 맨 위(0px)에서 시작하도록 설정 */
        #home-view { padding-top: 0; }

        /* 16:9 슬라이더 컨테이너 */
        .slider-container {
            position: relative;
            width: 100%; max-width: 1000px; margin: 0 auto; 
            aspect-ratio: 16 / 9; overflow: hidden;
            background-color: #342A21;
        }

        .slider-wrapper { display: flex; width: 100%; height: 100%; }
        .slide { flex: 0 0 100%; width: 100%; height: 100%; position: relative; }
        .slide img, .slide video { width: 100%; height: 100%; object-fit: cover; display: block; }

        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background-color: transparent; color: #F1E0C5;
            border: 1px solid rgba(241, 224, 197, 0.5); border-radius: 50%;
            width: 40px; height: 40px; display: flex;
            justify-content: center; align-items: center;
            cursor: pointer; font-size: 18px; z-index: 10; transition: all 0.3s;
        }
        .slider-btn:hover { background-color: rgba(241, 224, 197, 0.2); border-color: #F1E0C5; }
        .left-btn { left: 20px; }
        .right-btn { right: 20px; }

        /* 자막 애니메이션 */
        .intro-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #F1E0C5; text-shadow: 2px 2px 8px rgba(52, 42, 33, 0.8);
            width: 100%; pointer-events: none; 
        }
        .text-ko { font-size: 28px; font-weight: 600; letter-spacing: 2px; margin-bottom: 5px; opacity: 0; }
        .text-en { font-size: 32px; font-weight: 300; font-family: 'Times New Roman', serif; letter-spacing: 1px; opacity: 0; }
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .intro-text.animate .text-ko { animation: slideUp 0.8s ease forwards; animation-delay: 0.2s; }
        .intro-text.animate .text-en { animation: slideUp 0.8s ease forwards; animation-delay: 0.6s; }

        /* [요청] 사진 세로 길이의 2/3 여백 공간 */
        .slider-gap {
            height: calc(min(100vw, 1000px) * 0.375); /* 16:9 높이의 2/3 수식 계산값 */
            width: 100%;
        }

        /* [요청] 여백 밑에는 오직 지도 구역만 배치 */
        .map-section { text-align: center; padding: 0 20px 80px 20px; }

        .image-container {
            position: relative; display: inline-block; width: 100%; max-width: 900px;
            box-shadow: 0 8px 25px rgba(52, 42, 33, 0.15); border-radius: 12px;
            overflow: hidden; background-color: #ffffff; border: 2px solid #C9B79C;
        }
        .image-container img { width: 100%; display: block; }
        #route-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 지도 핀 */
        .map-pin {
            position: absolute; background-color: rgba(0, 100, 60, 0.15); border: 2px solid #00643C;
            border-radius: 50%; cursor: pointer; transform: translate(-50%, -50%); transition: all 0.3s ease; z-index: 10;
        }
        .map-pin:hover { background-color: rgba(0, 100, 60, 0.5); transform: translate(-50%, -50%) scale(1.2); }

        @media (max-width: 768px) {
            .top-bar { position: relative; display: block; text-align: center; background-color: #F1E0C5; }
            .logo-link { justify-content: center; margin-bottom: 10px; }
            .search-bar { justify-content: center; }
        }
    </style>
    <script>
        /* [요청] 새로고침 시 지도 기준이 아니라 스크롤 내리기 전 무조건 최상단 화면 배치 */
        if (history.scrollRestoration) { history.scrollRestoration = 'manual'; }
        window.scrollTo(0, 0);
    </script>
</head>
<body>

    <header class="top-bar">
        <a href="index.html" class="logo-link">
            <img src="logo.png" alt="이화여고 로고" class="logo-img">
        </a>
        
        <div class="search-bar">
            <label for="start-select">출발</label>
            <select id="start-select">
                <option value="">-- 출발지 선택 --</option>
                <option value="p1">이화 박물관(심슨 기념관)</option>
                <option value="p2">이화 백주년기념관</option>
                <option value="p3">본관(화암신봉조관)</option>
                <option value="p4">유관순 우물터</option>
                <option value="p5">노천극장</option>
                <option value="p6">유관순 기념관</option>
                <option value="p7">체육관(백상규 기념관)</option>
                <option value="p8">이화교회</option>
                <option value="p9">이화학사 김점동관(기숙사)</option>
                <option value="p10">대운동장</option>
                <option value="p11">도서관(전인항 기념 도서관)</option>
            </select>

            <label for="end-select">도착</label>
            <select id="end-select">
                <option value="">-- 도착지 선택 --</option>
                <option value="p1">이화 박물관(심슨 기념관)</option>
                <option value="p2">이화 백주년기념관</option>
                <option value="p3">본관(화암신봉조관)</option>
                <option value="p4">유관순 우물터</option>
                <option value="p5">노천극장</option>
                <option value="p6">유관순 기념관</option>
                <option value="p7">체육관(백상규 기념관)</option>
                <option value="p8">이화교회</option>
                <option value="p9">이화학사 김점동관(기숙사)</option>
                <option value="p10">대운동장</option>
                <option value="p11">도서관(전인항 기념 도서관)</option>
            </select>

            <button class="search-btn" onclick="drawPoints()">찾아보기</button>
        </div>
    </header>

    <div id="home-view">
        <!-- 상단 무한 카루셀 슬라이더 구역 -->
        <section class="slider-container">
            <button class="slider-btn left-btn" onclick="moveSlide(-1)">&#10094;</button>
            <div class="slider-wrapper" id="sliderWrapper">
                <!-- 무한 루프 구현을 위한 가상 슬라이드 (마지막 슬라이드 복제본) -->
                <div class="slide"><video src="IMG_1062.MOV" autoplay muted loop playsinline></video></div>
                
                <!-- 실제 슬라이드 1 ~ 5 -->
                <div class="slide">
                    <img src="IMG_2158.jpg" alt="체육관 학생들">
                    <div class="intro-text animate" id="introText">
                        <div class="text-ko">이화여자고등학교</div>
                        <div class="text-en">EWHA HIGH SCHOOL</div>
                    </div>
                </div>
                <div class="slide"><img src="IMG_2162.jpeg" alt="손을 모은 학생들"></div>
                <div class="slide"><img src="IMG_2163 (1).jpeg" alt="야구잠바를 입은 학생들"></div>
                <div class="slide"><video src="IMG_1591.mov" autoplay muted loop playsinline></video></div>
                <div class="slide"><video src="IMG_1062.MOV" autoplay muted loop playsinline></video></div>
                
                <!-- 무한 루프 구현을 위한 가상 슬라이드 (첫번째 슬라이드 복제본) -->
                <div class="slide"><img src="IMG_2158.jpg" alt="체육관 학생들"></div>
            </div>
            <button class="slider-btn right-btn" onclick="moveSlide(1)">&#10095;</button>
        </section>

        <!-- 사진 세로의 2/3 사이즈 여백 오프셋 -->
        <div class="slider-gap"></div>

        <!-- 단독 지도 섹션 배치 -->
        <section class="map-section" id="map-section-anchor">
            <div class="image-container">
                <img id="map-img" src="map.png" alt="이화여고 캠퍼스 지도">
                <canvas id="route-canvas"></canvas>
                
                <!-- 개별 상세 html 파일로 넘어가는 링크 핀 매핑 -->
                <div class="map-pin" style="top: 13%; left: 69%; width: 6%; height: 8%;" onclick="location.href='detail1.html'" title="1. 이화 박물관"></div>
                <div class="map-pin" style="top: 13%; left: 56%; width: 6%; height: 8%;" onclick="location.href='detail2.html'" title="2. 이화 백주년기념관"></div>
                <div class="map-pin" style="top: 31%; left: 67%; width: 6%; height: 8%;" onclick="location.href='detail3.html'" title="3. 본관"></div>
                <div class="map-pin" style="top: 34%; left: 84%; width: 6%; height: 8%;" onclick="location.href='detail4.html'" title="4. 유관순 우물터"></div>
                <div class="map-pin" style="top: 58%; left: 60%; width: 6%; height: 8%;" onclick="location.href='detail5.html'" title="5. 노천극장"></div>
                <div class="map-pin" style="top: 82%; left: 47%; width: 6%; height: 8%;" onclick="location.href='detail6.html'" title="6. 유관순 기념관"></div>
                <div class="map-pin" style="top: 88%; left: 28%; width: 6%; height: 8%;" onclick="location.href='detail7.html'" title="7. 체육관"></div>
                <div class="map-pin" style="top: 88%; left: 38%; width: 6%; height: 8%;" onclick="location.href='detail8.html'" title="8. 이화교회"></div>
                <div class="map-pin" style="top: 88%; left: 65%; width: 6%; height: 8%;" onclick="location.href='detail9.html'" title="9. 기숙사"></div>
                <div class="map-pin" style="top: 64%; left: 24%; width: 6%; height: 8%;" onclick="location.href='detail10.html'" title="10. 대운동장"></div>
                <div class="map-pin" style="top: 37%; left: 33%; width: 5%; height: 7%;" onclick="location.href='detail11.html'" title="11. 도서관"></div>
            </div>
        </section>
    </div>

    <script>
        const points = {
            p1: { x: 0.69, y: 0.13 }, p2: { x: 0.56, y: 0.13 }, p3: { x: 0.67, y: 0.31 },
            p4: { x: 0.84, y: 0.34 }, p5: { x: 0.60, y: 0.58 }, p6: { x: 0.47, y: 0.82 },
            p7: { x: 0.28, y: 0.88 }, p8: { x: 0.38, y: 0.88 }, p9: { x: 0.65, y: 0.88 },
            p10: { x: 0.24, y: 0.64 }, p11: { x: 0.33, y: 0.37 }
        };

        // --- [요청] 완벽한 무한 루프 카루셀 슬라이더 스크립트 ---
        let currentIndex = 1; 
        const sliderWrapper = document.getElementById('sliderWrapper');
        const introText = document.getElementById('introText');
        let isTransitioning = false;

        sliderWrapper.style.transform = `translateX(-100%)`;

        function moveSlide(direction) {
            if (isTransitioning) return;
            isTransitioning = true;

            currentIndex += direction;
            sliderWrapper.style.transition = "transform 0.4s ease-in-out";
            sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;

            sliderWrapper.addEventListener('transitionend', () => {
                sliderWrapper.style.transition = "none";
                if (currentIndex === 0) {
                    currentIndex = 5; 
                    sliderWrapper.style.transform = `translateX(-500%)`;
                } else if (currentIndex === 6) {
                    currentIndex = 1; 
                    sliderWrapper.style.transform = `translateX(-100%)`;
                }
                isTransitioning = false;

                if (currentIndex === 1) { introText.classList.add('animate'); } 
                else { introText.classList.remove('animate'); }
            }, { once: true });
        }

        // --- 지도 위 경로 핀 찍기 ---
        function drawPoints() {
            const startVal = document.getElementById('start-select').value;
            const endVal = document.getElementById('end-select').value;

            if (!startVal || !endVal) { alert("출발위치와 도착위치를 모두 선택해주세요."); return; }
            if (startVal === endVal) { alert("출발지와 도착지가 같습니다!"); return; }

            const canvas = document.getElementById('route-canvas');
            const ctx = canvas.getContext('2d');
            const img = document.getElementById('map-img');

            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const startPt = points[startVal];
            const endPt = points[endVal];

            // 출발점 핀 색상 (#E54B4B)
            ctx.beginPath();
            ctx.arc(startPt.x * canvas.width, startPt.y * canvas.height, 12, 0, 2 * Math.PI);
            ctx.fillStyle = "#E54B4B"; ctx.strokeStyle = "#F1E0C5"; ctx.lineWidth = 3;
            ctx.fill(); ctx.stroke();

            // 도착점 핀 색상 (#E54B4B)
            ctx.beginPath();
            ctx.arc(endPt.x * canvas.width, endPt.y * canvas.height, 12, 0, 2 * Math.PI);
            ctx.fillStyle = "#E54B4B"; ctx.strokeStyle = "#F1E0C5"; ctx.lineWidth = 3;
            ctx.fill(); ctx.stroke();

            document.getElementById('map-section-anchor').scrollIntoView({ behavior: 'smooth' });
        }

        window.addEventListener('resize', () => {
            const startVal = document.getElementById('start-select').value;
            const endVal = document.getElementById('end-select').value;
            if (startVal && endVal) drawPoints();
        });
    </script>
</body>
</html>
