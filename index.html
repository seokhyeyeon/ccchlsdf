<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이화여고 캠퍼스 가이드</title>
    <style>
        /* 기본적인 레이아웃 구성을 위한 최소한의 스타일 (기존 CSS에 맞춰 변경 가능) */
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background-color: #f8f9fa; }
        .map-container { position: relative; display: inline-block; }
        .map-pin { position: absolute; width: 20px; height: 20px; background-color: red; border-radius: 50%; cursor: pointer; }
        .info-section { padding: 20px; border-top: 1px solid #ccc; margin-top: 20px; }
        /* 편의시설 정보 스타일 */
        .facility-info { margin-top: 15px; font-weight: bold; color: #2c3e50; font-size: 1.1em; background-color: #edf2f7; padding: 10px; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

    <header>
        <a>
            <img alt="이화여고 로고" src="logo.png">
        </a>
        
        <div>
            <select id="start-select" onchange="updatePlaceInfo(this.value)">
                <option value="">-- 출발지 선택 --</option>
                <option value="p1">이화 박물관(심슨 기념관)</option>
                <option value="p2">이화 백주년기념관</option>
                <option value="p3">본관(화암신봉조관)</option>
                <option value="p4">유관순 우물터</option>
                <option value="p5">노천극장</option>
                <option value="p6">유관순 기념관</option>
                <option value="p7">체육관(백상규 기념관)</option>
                <option value="p8">이화교회</option>
                <option value="p9">이화학사 김점동관(기숙사)</option>
                <option value="p10">대운동장</option>
                <option value="p11">도서관(전인항 기념 도서관)</option>
            </select>

            <select id="end-select" onchange="updatePlaceInfo(this.value)">
                <option value="">-- 도착지 선택 --</option>
                <option value="p1">이화 박물관(심슨 기념관)</option>
                <option value="p2">이화 백주년기념관</option>
                <option value="p3">본관(화암신봉조관)</option>
                <option value="p4">유관순 우물터</option>
                <option value="p5">노천극장</option>
                <option value="p6">유관순 기념관</option>
                <option value="p7">체육관(백상규 기념관)</option>
                <option value="p8">이화교회</option>
                <option value="p9">이화학사 김점동관(기숙사)</option>
                <option value="p10">대운동장</option>
                <option value="p11">도서관(전인항 기념 도서관)</option>
            </select>
        </div>
    </header>

    <div>
        <section>
            <div>
                <div>
                    <img alt="체육관 학생들" src="IMG_2158.jpg">
                    <div>
                        <div>이화여자고등학교</div>
                        <div>EWHA HIGH SCHOOL</div>
                    </div>
                </div>
                </div>
        </section>

        <section>
            <div class="map-container">
                <img alt="이화여고 캠퍼스 지도" src="map.png">
                <canvas></canvas>
                
                <div class="map-pin" style="top:10%; left:10%;" title="1. 이화 박물관" onclick="updatePlaceInfo('p1')"></div>
                <div class="map-pin" style="top:20%; left:20%;" title="2. 이화 백주년기념관" onclick="updatePlaceInfo('p2')"></div>
                <div class="map-pin" style="top:30%; left:30%;" title="3. 본관" onclick="updatePlaceInfo('p3')"></div>
                <div class="map-pin" style="top:40%; left:40%;" title="4. 유관순 우물터" onclick="updatePlaceInfo('p4')"></div>
                <div class="map-pin" style="top:50%; left:50%;" title="5. 노천극장" onclick="updatePlaceInfo('p5')"></div>
                <div class="map-pin" style="top:60%; left:60%;" title="6. 유관순 기념관" onclick="updatePlaceInfo('p6')"></div>
                <div class="map-pin" style="top:70%; left:70%;" title="7. 체육관" onclick="updatePlaceInfo('p7')"></div>
                <div class="map-pin" style="top:80%; left:80%;" title="8. 이화교회" onclick="updatePlaceInfo('p8')"></div>
                <div class="map-pin" style="top:85%; left:85%;" title="9. 기숙사" onclick="updatePlaceInfo('p9')"></div>
                <div class="map-pin" style="top:90%; left:90%;" title="10. 대운동장" onclick="updatePlaceInfo('p10')"></div>
                <div class="map-pin" style="top:95%; left:95%;" title="11. 도서관" onclick="updatePlaceInfo('p11')"></div>
            </div>
        </section>
    </div>

    <div class="info-section">
        <h2 id="place-title">장소 이름</h2>
        <div id="place-description">장소에 대한 설명이 이곳에 표시됩니다.</div>
        <div id="facility-info-box" class="facility-info" style="display: none;"></div>
        <br>
    </div>

    <script>
        // 각 장소별 기본 설명과 요청하신 편의시설(엘리베이터 등) 데이터 정의
        const campusPlaces = {
            p1: {
                name: "이화 박물관(심슨 기념관)",
                desc: "이화 박물관에 대한 상세 설명이 들어가는 자리입니다.",
                facility: "" // 별도 요청 없으므로 공백
            },
            p2: {
                name: "이화 백주년기념관",
                desc: "이화 백주년기념관에 대한 상세 설명이 들어가는 자리입니다.",
                facility: "엘리베이터 O / 계단 O"
            },
            p3: {
                name: "본관(화암신봉조관)",
                desc: "본관(화암신봉조관)에 대한 상세 설명이 들어가는 자리입니다.",
                facility: "엘리베이터 O / 램프 O / 계단 O"
            },
            p4: {
                name: "유관순 우물터",
                desc: "유관순 우물터에 대한 상세 설명이 들어가는 자리입니다.",
                facility: ""
            },
            p5: {
                name: "노천극장",
                desc: "노천극장에 대한 상세 설명이 들어가는 자리입니다.",
                facility: ""
            },
            p6: {
                name: "유관순 기념관",
                desc: "유관순 기념관에 대한 상세 설명이 들어가는 자리입니다.",
                facility: "엘리베이터 X / 계단 O"
            },
            p7: {
                name: "체육관(백상규 기념관)",
                desc: "체육관(백상규 기념관)에 대한 상세 설명이 들어가는 자리입니다.",
                facility: "엘리베이터 O / 계단 O"
            },
            p8: {
                name: "이화교회",
                desc: "이화교회에 대한 상세 설명이 들어가는 자리입니다.",
                facility: ""
            },
            p9: {
                name: "이화학사 김점동관(기숙사)",
                desc: "이화학사 김점동관(기숙사)에 대한 상세 설명이 들어가는 자리입니다.",
                facility: "엘리베이터 O / 계단 O"
            },
            p10: {
                name: "대운동장",
                desc: "대운동장에 대한 상세 설명이 들어가는 자리입니다.",
                facility: ""
            },
            p11: {
                name: "도서관(전인항 기념 도서관)",
                desc: "도서관(전인항 기념 도서관)에 대한 상세 설명이 들어가는 자리입니다.",
                facility: "엘리베이터 X / 계단 O"
            }
        };

        // 장소를 선택하거나 클릭했을 때 화면 정보를 업데이트하는 함수
        function updatePlaceInfo(placeKey) {
            const titleEl = document.getElementById('place-title');
            const descEl = document.getElementById('place-description');
            const facilityEl = document.getElementById('facility-info-box');

            if (!placeKey || !campusPlaces[placeKey]) {
                titleEl.innerText = "장소 이름";
                descEl.innerText = "장소에 대한 설명이 이곳에 표시됩니다.";
                facilityEl.style.display = "none";
                return;
            }

            const place = campusPlaces[placeKey];
            
            // 제목과 설명 업데이트
            titleEl.innerText = place.name;
            descEl.innerText = place.desc;

            // 편의시설(엘리베이터 등) 정보가 있는 경우에만 아래에 표시
            if (place.facility) {
                facilityEl.innerText = place.facility;
                facilityEl.style.display = "inline-block";
            } else {
                facilityEl.style.display = "none"; // 정보가 없으면 숨김
            }
        }
    </script>
</body>
</html>
